<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Calculadora Remota Pyro5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #FFF8E7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            border: 3px solid #FFD700;
        }

        .header {
            background: #FFD700;
            color: #333;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 700;
            color: #333;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            font-size: 14px;
            color: #555;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            color: #333;
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        .status.connected::before {
            content: '● ';
            color: #28a745;
        }

        .status.disconnected::before {
            content: '● ';
            color: #FF6B6B;
        }

        .content {
            padding: 40px;
            background: #FFFEF9;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            color: #333;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .input-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="number"] {
            padding: 12px 15px;
            border: 2px solid #FFD700;
            border-radius: 6px;
            font-size: 16px;
            transition: all 0.3s;
            background: #FFFACD;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .operation-btn {
            background: #FFA500;
            color: white;
            border: 2px solid #FF8C00;
        }

        .operation-btn:hover {
            background: #FF8C00;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 165, 0, 0.3);
        }

        .operation-btn:active {
            transform: translateY(0);
        }

        .result-box {
            background: #FFE4B5;
            color: #333;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 30px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            border: 3px solid #FFD700;
        }

        .result-box.empty {
            background: #FFFACD;
            color: #999;
            font-size: 16px;
            border: 2px solid #E8E059;
        }

        .historial-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #FFD700;
        }

        .historial-section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .historial-box {
            background: #FFFACD;
            border: 2px solid #FFD700;
            border-radius: 6px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .historial-item {
            padding: 10px;
            color: #333;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border-bottom: 1px solid #FFE4B5;
        }

        .historial-item:last-child {
            border-bottom: none;
        }

        .historial-empty {
            color: #999;
            text-align: center;
            padding: 30px 10px;
            font-style: italic;
        }

        .historial-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }

        .secondary-btn {
            background: #FFD700;
            color: #333;
            font-size: 14px;
            border: 2px solid #FFA500;
        }

        .secondary-btn:hover {
            background: #FFC700;
            transform: translateY(-2px);
        }

        .danger-btn {
            background: #FF6B6B;
            color: white;
            font-size: 14px;
            border: 2px solid #FF5252;
        }

        .danger-btn:hover {
            background: #FF5252;
            transform: translateY(-2px);
        }

        .error-message {
            background: #FFE4E1;
            color: #C41E3A;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            border: 2px solid #FF6B6B;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .content {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            .buttons-grid {
                grid-template-columns: 1fr;
            }

            .historial-actions {
                grid-template-columns: 1fr;
            }
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        .icon {
            width: 18px;
            height: 18px;
            flex: 0 0 auto;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Icono grande específico para el header (calculadora) */
        .header h1 .icon {
            width: 32px;
            height: 32px;
        }

        .icon.fill {
            fill: currentColor;
            stroke: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="4" y="3" width="16" height="18" rx="3"></rect>
                    <rect x="7" y="6" width="10" height="3" rx="1"></rect>
                    <path d="M8 12h.01"></path>
                    <path d="M12 12h.01"></path>
                    <path d="M16 12h.01"></path>
                    <path d="M8 16h.01"></path>
                    <path d="M12 16h.01"></path>
                    <path d="M16 16h.01"></path>
                </svg>
                Calculadora Remota
            </h1>
            <p>Conectado a Pyro5</p>
            <div class="status connected" id="status">Conectado</div>
        </div>

        <div class="content">
            <div class="error-message" id="errorBox"></div>

            <div class="input-group">
                <label>Números</label>
                <div class="input-wrapper">
                    <input type="number" id="num1" placeholder="Número 1" step="any">
                    <input type="number" id="num2" placeholder="Número 2" step="any">
                </div>
            </div>

            <div class="buttons-grid">
                <button class="operation-btn" onclick="operacion('suma')">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 5v14"></path>
                        <path d="M5 12h14"></path>
                    </svg>
                    Suma
                </button>
                <button class="operation-btn" onclick="operacion('resta')">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 12h14"></path>
                    </svg>
                    Resta
                </button>
                <button class="operation-btn" onclick="operacion('multiplicacion')">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 6l12 12"></path>
                        <path d="M18 6L6 18"></path>
                    </svg>
                    Multiplicar
                </button>
                <button class="operation-btn" onclick="operacion('division')">
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 12h14"></path>
                        <circle cx="12" cy="7" r="1.5"></circle>
                        <circle cx="12" cy="17" r="1.5"></circle>
                    </svg>
                    Dividir
                </button>
            </div>

            <div class="result-box empty" id="resultBox">Esperando operación...</div>

            <div class="historial-section">
                <h2>
                    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 19V5"></path>
                        <path d="M4 19h16"></path>
                        <path d="M8 15v-4"></path>
                        <path d="M12 15V8"></path>
                        <path d="M16 15v-6"></path>
                    </svg>
                    Historial
                </h2>
                <div class="historial-box" id="historialBox">
                    <div class="historial-empty">Cargando historial...</div>
                </div>
                <div class="historial-actions">
                    <button class="danger-btn" onclick="limpiarHistorial()">
                        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 6h18"></path>
                            <path d="M8 6V4h8v2"></path>
                            <path d="M6 6l1 14h10l1-14"></path>
                            <path d="M10 10v6"></path>
                            <path d="M14 10v6"></path>
                        </svg>
                        Limpiar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            actualizarHistorial();
            verificarConexion();
            setInterval(verificarConexion, 5000);
        });

        function verificarConexion() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    const status = document.getElementById('status');
                    if (data.conectado) {
                        status.className = 'status connected';
                        status.textContent = 'Conectado';
                    } else {
                        status.className = 'status disconnected';
                        status.textContent = 'Desconectado';
                    }
                })
                .catch(() => {
                    const status = document.getElementById('status');
                    status.className = 'status disconnected';
                    status.textContent = 'Desconectado';
                });
        }

        async function operacion(tipo) {
            const num1 = document.getElementById('num1').value;
            const num2 = document.getElementById('num2').value;

            if (!num1 || !num2) {
                mostrarError('Por favor ingresa ambos números');
                return;
            }

            try {
                const response = await fetch(`/api/${tipo}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ a: parseFloat(num1), b: parseFloat(num2) })
                });

                const data = await response.json();

                if (data.error) {
                    mostrarError(data.error);
                } else {
                    const simbolos = {
                        'suma': '+',
                        'resta': '-',
                        'multiplicacion': '×',
                        'division': '÷'
                    };
                    
                    const resultBox = document.getElementById('resultBox');
                    resultBox.className = 'result-box';
                    resultBox.textContent = `${num1} ${simbolos[tipo]} ${num2} = ${data.resultado}`;
                    
                    document.getElementById('num1').value = '';
                    document.getElementById('num2').value = '';
                    document.getElementById('num1').focus();
                    
                    actualizarHistorial();
                    limpiarError();
                }
            } catch (error) {
                mostrarError('Error en la comunicación con el servidor');
            }
        }

        function actualizarHistorial() {
            const historialBox = document.getElementById('historialBox');
            fetch('/api/historial')
                .then(r => r.json())
                .then(data => {
                    if (data && data.historial && data.historial.length > 0) {
                        historialBox.innerHTML = data.historial
                            .map((item, i) => `<div class="historial-item">${i + 1}. ${item}</div>`)
                            .join('');
                    } else {
                        historialBox.innerHTML = '<div class="historial-empty">Sin operaciones realizadas</div>';
                    }
                });
        }

        function limpiarHistorial() {
            if (confirm('¿Deseas limpiar el historial?')) {
                fetch('/api/limpiar', { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        if (!data.error) {
                            actualizarHistorial();
                            document.getElementById('resultBox').className = 'result-box empty';
                            document.getElementById('resultBox').textContent = 'Historial limpiado';
                        }
                    });
            }
        }

        function mostrarError(mensaje) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerHTML = '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true" style="margin-right:8px; vertical-align:-3px;"><path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.3 4.5h3.4L21 18.5H3L10.3 4.5Z"></path></svg>' + mensaje;
            errorBox.className = 'error-message show';
        }

        function limpiarError() {
            const errorBox = document.getElementById('errorBox');
            errorBox.className = 'error-message';
        }

        document.getElementById('num1').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('num2').focus();
        });

        document.getElementById('num2').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') operacion('suma');
        });
    </script>
</body>
</html>
